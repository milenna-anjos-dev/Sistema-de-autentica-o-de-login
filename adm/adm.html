<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area do ADM</title>
    <link rel="stylesheet" href="../adm/adm.css">
</head>
<body>
    <section class="inicio">
        <header class="header-box">
            <h1>Painel do administrador</h1>
            <p>Para proseguir escreva seu nome e sua entrada</p>
        </header>
    </section>
    <section id="login" class="login-box">
       <div class="card">
       <h2>NovaTech</h2>
       <form id="adm">
              <input type="text" id="nome" placeholder="Seu nome">
              <input type="text" id="entrada" placeholder="Seu número de entrada">
              <button type="submit">Entrar</button>
              <p id="mensagem"></p>
       </form>
    </div>
   </section>
  <script src="./adm.js"></script>
</body>
</html>
